<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Produto - Helloja</title>

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/css/produto.css" />
</head>
<body>
  <header class="produto-header">
    <a href="/index.html" class="produto-logo">Helloja</a>

    <nav class="produto-nav">
      <a href="/index.html">Catálogo</a>
      <a href="/carrinho.html">Carrinho</a>
      <a href="/login.html">Login</a>
      <a href="/perfil.html">Perfil</a>
    </nav>
  </header>

  <main class="produto-container">
    <section id="produto-carregando" class="produto-status">
      Carregando produto...
    </section>

    <section id="produto-erro" class="produto-status produto-status-erro escondido">
      Produto não encontrado.
    </section>

    <section id="produto-detalhe" class="produto-detalhe escondido">
      <div class="produto-galeria">
        <div class="produto-imagem-principal-wrapper">
          <img
            id="produto-imagem-principal"
            class="produto-imagem-principal"
            src=""
            alt=""
          />
        </div>

        <div id="produto-miniaturas" class="produto-miniaturas"></div>
      </div>

      <div class="produto-info">
        <p id="produto-sku" class="produto-sku"></p>

        <h1 id="produto-nome" class="produto-nome"></h1>

        <p id="produto-descricao" class="produto-descricao"></p>

        <div class="produto-precos">
          <span id="produto-preco-original" class="produto-preco-original"></span>
          <span id="produto-preco-final" class="produto-preco-final"></span>
        </div>

        <p id="produto-estoque" class="produto-estoque"></p>

        <div class="produto-compra">
          <label for="produto-quantidade">Quantidade</label>

          <div class="produto-quantidade-controle">
            <button id="btn-diminuir" type="button">-</button>

            <input
              id="produto-quantidade"
              type="number"
              min="1"
              value="1"
            />

            <button id="btn-aumentar" type="button">+</button>
          </div>

          <button id="btn-adicionar-carrinho" class="btn-adicionar" type="button">
            Adicionar ao carrinho
          </button>

          <p id="produto-mensagem" class="produto-mensagem"></p>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/produto.js"></script>
</body>
</html>
