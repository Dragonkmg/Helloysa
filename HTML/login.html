<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Entrar - Helloja</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/conta.css">
</head>
<body>
  <div id="navbar-root"></div>

  <main class="pagina-conta">
    <section class="cabecalho-conta">
      <p class="etiqueta-pagina">Sua conta</p>
      <h1>Entrar</h1>
      <p>
        Acesse seu perfil para finalizar compras e acompanhar seus pedidos.
      </p>
    </section>

    <section class="layout-conta">
      <div class="card-conta">
        <h2>Login</h2>
        <p class="texto-conta">
          Use o e-mail e a senha cadastrados na Helloja.
        </p>

        <form id="form-login" class="form-conta">
          <label>
            E-mail
            <input
              id="login-email"
              name="email"
              type="email"
              placeholder="email@exemplo.com"
              autocomplete="email"
              required
            />
          </label>

          <label>
            Senha
            <input
              id="login-senha"
              name="senha"
              type="password"
              placeholder="Sua senha"
              autocomplete="current-password"
              required
            />
          </label>

          <button id="btn-login" class="btn-conta" type="submit">
            Entrar
          </button>
        </form>

        <div id="mensagem-login" class="mensagem-conta escondido"></div>
      </div>

      <aside class="card-conta card-conta-secundario">
        <h2>Ainda não tem perfil?</h2>
        <p class="texto-conta">
          Crie sua conta para salvar seus dados e vincular suas compras ao perfil.
        </p>

        <a id="link-cadastro" class="btn-conta btn-conta-secundario" href="/cadastro.html">
          Criar cadastro
        </a>
      </aside>
    </section>
  </main>

  <script src="/js/navbar.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
