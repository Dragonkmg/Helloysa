<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cadastro - Helloja</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/conta.css">
</head>
<body>
  <div id="navbar-root"></div>

  <main class="pagina-conta">
    <section class="cabecalho-conta">
      <p class="etiqueta-pagina">Novo perfil</p>
      <h1>Criar cadastro</h1>
      <p>
        Cadastre-se para finalizar compras e acompanhar seus pedidos.
      </p>
    </section>

    <section class="layout-conta">
      <div class="card-conta">
        <h2>Dados da conta</h2>
        <p class="texto-conta">
          Informe seus dados principais. A senha precisa ter pelo menos 6 caracteres.
        </p>

        <form id="form-cadastro" class="form-conta">
          <label>
            Nome
            <input
              id="cadastro-nome"
              name="nome"
              type="text"
              placeholder="Seu nome"
              autocomplete="name"
              required
            />
          </label>

          <label>
            E-mail
            <input
              id="cadastro-email"
              name="email"
              type="email"
              placeholder="email@exemplo.com"
              autocomplete="email"
              required
            />
          </label>

          <label>
            Telefone
            <input
              id="cadastro-telefone"
              name="telefone"
              type="tel"
              placeholder="Telefone ou WhatsApp"
              autocomplete="tel"
            />
          </label>

          <label>
            Senha
            <input
              id="cadastro-senha"
              name="senha"
              type="password"
              placeholder="Crie uma senha"
              autocomplete="new-password"
              required
            />
          </label>

          <label>
            Confirmar senha
            <input
              id="cadastro-confirmar-senha"
              name="confirmar_senha"
              type="password"
              placeholder="Repita a senha"
              autocomplete="new-password"
              required
            />
          </label>

          <button id="btn-cadastro" class="btn-conta" type="submit">
            Criar conta
          </button>
        </form>

        <div id="mensagem-cadastro" class="mensagem-conta escondido"></div>
      </div>

      <aside class="card-conta card-conta-secundario">
        <h2>Já tem conta?</h2>
        <p class="texto-conta">
          Entre para continuar sua compra ou ver seu perfil.
        </p>

        <a id="link-login" class="btn-conta btn-conta-secundario" href="/login.html">
          Entrar
        </a>
      </aside>
    </section>
  </main>

  <script src="/js/navbar.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cadastro.js"></script>
</body>
</html>
